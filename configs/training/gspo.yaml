# ms-swift GRPOTrainer with importance_sampling_level=sequence (GSPO)
n_completions_per_state: 8      # num_generations (G)
clip_eps: 3.0e-4                # epsilon (lower bound)
clip_eps_high: 4.0e-4           # epsilon_high (upper bound, asymmetric clipping)
steps_per_generation: 4         # minibatch gradient steps per rollout batch
kl_coeff: 0.04                  # beta — KL penalty against reference policy
lr: 1.0e-5
grad_clip: 1.0
n_updates: 1000
episodes_per_update: 16         # used by rollout dataset collector
